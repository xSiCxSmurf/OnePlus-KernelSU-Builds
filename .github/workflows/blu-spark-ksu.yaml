name: Build LineageOS OPlus SM8250 Kernel

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace
    
    - name: Download Toolchains
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir clang-aosp gcc-64
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main-kernel-build-2023/clang-r487747c.tar.gz
        tar -C clang-aosp/ -zxvf clang-r487747c.tar.gz
        wget -O gcc-aarch64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz
        tar -C gcc-64/ -zxvf gcc-aarch64.tar.gz
    
    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/engstk/op8 -b blu_spark-16-custom android-kernel --depth=1

    - name: Download SUSFS from GitLab
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        # Cloning the specific kernel-4.19 branch from simonpunk's GitLab
        git clone https://gitlab.com/simonpunk/susfs4ksu -b kernel-4.19 susfs

    - name: Setup KernelSU Next 3.1.0
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s v3.1.0-legacy
        KSU_VERSION=$(cd KernelSU-Next && expr $(/usr/bin/git rev-list --count HEAD) + 10200)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

    - name: Apply SUSFS Patches
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/susfs
        
        # 1. Copy SUSFS source files
        # The GitLab repo layout often puts these in the root or a 'kernel_patches' subfolder
        cp ./fs/susfs.c $GITHUB_WORKSPACE/kernel_workspace/android-kernel/fs/ || cp ./kernel_patches/fs/susfs.c $GITHUB_WORKSPACE/kernel_workspace/android-kernel/fs/
        cp ./include/linux/susfs.h $GITHUB_WORKSPACE/kernel_workspace/android-kernel/include/linux/ || cp ./kernel_patches/include/linux/susfs.h $GITHUB_WORKSPACE/kernel_workspace/android-kernel/include/linux/
        
        # 2. Prepare KernelSU-Next 3.1.0
        KSU_PATCH=$(find . -name "10_enable_susfs_for_ksu.patch" | head -n 1)
        cp $KSU_PATCH $GITHUB_WORKSPACE/kernel_workspace/android-kernel/KernelSU-Next/
        
        # 3. Patch KernelSU-Next
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/KernelSU-Next
        patch -p1 < 10_enable_susfs_for_ksu.patch || echo "KSU-Next patch partially failed"
        
        # 4. Patch Main Kernel (4.19)
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/
        MAIN_PATCH=$(find $GITHUB_WORKSPACE/kernel_workspace/susfs -name "50_add_susfs_in_kernel-4.19.patch" | head -n 1)
        cp $MAIN_PATCH .
        patch -p1 < $(basename $MAIN_PATCH) || echo "Main kernel SUSFS patch partially failed"
        
        # 5. Inject Configs
        echo "CONFIG_KSU=y" >> arch/arm64/configs/blu_spark_defconfig
        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/blu_spark_defconfig
        echo "CONFIG_SUSFS=y" >> arch/arm64/configs/blu_spark_defconfig

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin:$PATH
        
        BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android-"
        EX_CMD="LD=ld.lld LLVM=1 LLVM_IAS=1"
        
        make O=out ARCH=arm64 CC=clang $BA_CMD $EX_CMD blu_spark_defconfig
        make O=out ARCH=arm64 CC=clang $BA_CMD $EX_CMD olddefconfig
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang $BA_CMD $EX_CMD KCFLAGS="-Wno-error"
    
    - name: Pack AnyKernel3
      if: success()
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel3
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/
        cd AnyKernel3 && zip -r $GITHUB_WORKSPACE/AK3-KSU-Next-SUSFS-Simonpunk-${{ env.BUILD_TIME }}.zip ./*

    - name: Upload Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Kernel-Simonpunk-SUSFS
        path: |
          kernel_workspace/android-kernel/out/arch/arm64/boot/Image
          *.zip
